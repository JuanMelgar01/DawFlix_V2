<section class="landing">
  <div class="landing__glow landing__glow--one"></div>
  <div class="landing__glow landing__glow--two"></div>

  <div class="landing__card">
    <div class="landing__brand">
      <img class="landing__logo" src="/dawflix-logo.svg" alt="Dawflix" />
      <p class="landing__eyebrow">Tu catálogo de cine y series</p>
    </div>

    <div class="landing__divider" aria-hidden="true"></div>

    <div class="landing__actions">
      <p class="landing__title">Accede para seguir explorando.</p>
      <p class="landing__text">Crea tu cuenta o entra con la tuya y continúa donde lo dejaste.</p>

      <div class="landing__buttons">
        <a class="landing__button landing__button--primary" routerLink="/register">Registrarse</a>
        <a class="landing__button landing__button--secondary" routerLink="/login">Iniciar sesión</a>
      </div>
    </div>
  </div>
</section>
