spring.application.name=dawflix-api
server.port=8084
spring.config.import=optional:file:.env[.properties],optional:file:./dawflix-api/.env[.properties]
spring.jpa.hibernate.ddl-auto=update
# La primera vez descomenado
# Una vez creada comento
# spring.sql.init.mode=always

spring.datasource.url=jdbc:mysql://localhost:3306/dawflix
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.show-sql=true
spring.sql.init.encoding=UTF-8

# Envío de correos
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${Login_SMTP}
spring.mail.password=${Password_SMTP}
spring.mail.from=${Email_SMTP}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
logging.level.org.springframework.mail=DEBUG
logging.level.org.eclipse.angus.mail=DEBUG
logging.level.jakarta.mail=DEBUG

# Configuración api TMDB
tmdb.base-url=https://api.themoviedb.org/3
tmdb.image-url=https://image.tmdb.org/t/p/original
tmdb.token=${tokenTMDB}